---
# Source: stream-ingestion/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: stream-ingestion-dev
  labels:
    app.kubernetes.io/name: stream-ingestion
    app.kubernetes.io/instance: stream-ingestion-dev
    app.kubernetes.io/version: ""
    app.kubernetes.io/part-of: logiflow
    app.kubernetes.io/managed-by: Helm
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: stream-ingestion
    app.kubernetes.io/instance: stream-ingestion-dev
---
# Source: stream-ingestion/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stream-ingestion-dev
  labels:
    app.kubernetes.io/name: stream-ingestion
    app.kubernetes.io/instance: stream-ingestion-dev
    app.kubernetes.io/version: ""
    app.kubernetes.io/part-of: logiflow
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: stream-ingestion
      app.kubernetes.io/instance: stream-ingestion-dev
  template:
    metadata:
      labels:
        app.kubernetes.io/name: stream-ingestion
        app.kubernetes.io/instance: stream-ingestion-dev
    spec:
      securityContext:
        runAsNonRoot: true
        fsGroup: 1000
      containers:
        - name: stream-ingestion
          image: "logiflow/stream-ingestion:local"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 2
          livenessProbe:
            httpGet:
              path: /live
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
      env:
        - name: KAFKA_BROKER
          value: "kafka:9092"
        - name: INPUT_TOPIC
          value: "events-raw"
