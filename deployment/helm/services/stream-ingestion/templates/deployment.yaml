apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "logiflow.name" . }}
  labels:
    {{- include "logiflow.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "logiflow.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "logiflow.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        {{- include "logiflow.podSecurityContext" . | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
          securityContext:
            {{- include "logiflow.containerSecurityContext" . | nindent 12 }}
          resources:
            {{- include "logiflow.resources" . | nindent 12 }}
          readinessProbe:
            {{- include "logiflow.readinessProbe" . | nindent 12 }}
          livenessProbe:
            {{- include "logiflow.livenessProbe" . | nindent 12 }}
          env:
            - name: KAFKA_BROKER
              value: {{ .Values.config.kafkaBroker | quote }}
            - name: INPUT_TOPIC
              value: {{ .Values.config.inputTopic | quote }}